name: Remote Site Monitor

on:
  schedule:
    # 每 15 分钟运行一次。公有仓库通常延迟很低。
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  monitor-job:
    runs-on: ubuntu-latest
    steps:
      - name: 获取仓库代码
        uses: actions/checkout@v4

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖库
        run: pip install requests

      - name: 执行监控脚本
        env:
          PA_WEBHOOK_URL: ${{ secrets.PA_WEBHOOK_URL }}
        run: python monitor.py
